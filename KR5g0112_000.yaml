body:
  text: 第一上上乾德之建元亨利貞君子體焉陳紀立經占陰晴晴田蠶大收墳葬吉利六畜大旺行人立至求謀大遂求財大利婚姻大成官事大吉謁見遇貴出行大通修造清吉疾病即愈走失即見生産有喜捕盜便獲禱祀獲福怪異無咎移徙獲吉家宅大安文書有就已上大吉應一五七數及亥卯未年月日時方位正東第二中平履霜堅氷陰凝否極春日載陽勾萌畢出占陰晴雨田蠶半收墳葬半利六畜半吉行人在路求謀半遂求財半利婚姻晚成官事先凶後吉謁見小阻出行半遂修造宜遲疾病先凶後吉走失見遲生産先凶後吉捕盜獲遲禱祀小順怪異將散移徙動遲家宅向安文書遲滯已上先凶後吉應二四八數及寅午戌年月日時方位西南第三中平福不虛降禍不妄加居常履道神保是嘉占陰晴半陰半晴田蠶穩墳葬平穩行人遲六畜平常求謀遂意求財有利婚姻有成官事和平謁見無阻出行宜緩修造守常疾病可醫走失可尋生産安好捕盜得獲禱祀無應怪異無事移徙守舊家宅平安文書宜求已上中平應三六九數及巳酉丑年月日時方位正西第四中平挾我良弓射獵東阜路有嗥羆發之中脰占陰晴雨田蠶有望墳葬小吉六畜無損行人將至求謀晚遂求財利遲婚姻可成官事無事謁見可許出行宜出修造宜動疾病不妨走失宜尋生産有驚捕盜去遠禱祀半吉怪異微災移徙小利家宅終吉文書見遲已上中凶始末吉應二四八數乃寅午戌年月日時方位正南第五下下東園桃李紅白其華風雨凌之萎絶泥沙占陰晴晴田蠶無收墳葬後災六畜耗失行人有阻求謀不遂求財不利婚姻不成官事難解謁見難遇出行阻滯修造不吉疾病難醫走失難見生産難捕盜不獲禱祀不宜怪異有災移徙動凶家宅不寧文書難得已上先吉後凶應一五七數及亥卯未年月日時方位東北第六下下朝經太行路多詰屈既過長阪復行荆棘占陰晴半陰半晴田蠶失望墳葬不吉六畜有損行人阻滯求謀不成求財無利婚姻有破官事纍後謁見間阻出行不順修造不利疾病難瘥走失難見主産難保捕盜難獲禱祀無益怪異興災移徙見凶家宅不吉文書難得已上中吉始末凶應三六九數及申子辰年月日時方位西北第七下下遠遊絶域常懷故鄉獨行踽踽憂心惶惶占陰晴晴田蠶不收墳葬敗家六畜災損行人不回求謀大不遂求財大不利婚姻大不成官事大凶謁見不遇出行不宜修造不利疾病危篤走失不見生産見凶捕盜休尋禱祀招禍怪異官事移徙官非家宅大不安文書不遂已上全凶應一五七數及亥卯未年月日時方位正東第八上上隰有桑麻田有黍稷外户不扃畜産蕃息占陰晴雨田蠶大收墳葬吉利六畜大旺行人立至求謀大遂求財大利婚姻大成官事大吉謁見遇貴出行大通修造清吉疾病即愈走失即見生産有喜捕盜便獲禱祀獲福怪異無咎移徙獲吉家宅大安文書有就已上大吉應二四八數及寅午戌年月日時方位西南第九中平石磴緣雲絶澗在傍白鹿前導乃至金堂占陰晴半陰半晴田蠶半收墳葬半利六畜半吉行人在路求謀半遂求財半利婚姻晚成官事先凶後吉謁見小阻出行半遂修造宜遲疾病先凶後吉走失見遲生産先凶後吉捕盜獲遲禱祀小順怪異將散移徙動遲家宅向安文書遲滯已上先凶後吉應三六九數及巳酉丑年月日時方位正北第十中平甕牖繩樞簞食瓢飲所樂者天日晏安寢占陰晴晴田蠶穩墳葬平穩六畜平常行人遲求謀遂意求財有利婚姻有成官事和平謁見無阻出行宜緩修造守常疾病可醫走失可尋生産安好捕盜得獲禱祀無應移徙守舊怪異無事家宅平安文書宜求已上中平應一五七數及亥卯未年月日時方位東北第十一中平九扈催耕我耨我鋤旱魃為災霖雨來蘇占陰晴晴田蠶有望墳葬小吉六畜無損行人將至求謀晚遂求財利遲婚姻可成官事無事謁見可許出行宜出修造宜動疾病不妨走失宜尋生産有驚捕盜去遠禱祀半吉怪異微災移徙小利家宅終吉文書見遲已上中凶始末吉應一五七數及亥卯未年月日時方位正東第十二下下蒼蒼雲木材堪梁棟枝披葉摧患生於用占陰晴雨田蠶無收墳葬後災六畜耗失行人有阻求謀不遂求財不利婚姻不成官事難解謁見難遇出行阻滯修造不吉疾病難醫走失難見生産難捕盜不獲禱祀不宜怪異有災移徙動凶家宅不寧文書難得已上先吉後凶應二四八數及寅午戌年月日時方位正南第十三下下凶歲苦飢投耒學仕宦成而怠更遭斥棄占陰晴半陰半晴田蠶失望墳葬不吉六畜有損行人阻滯求謀不成求財無利婚姻有破官事纍後謁見間阻出行不順修造不利疾病難瘥走失難見生産難保捕盜難獲禱祀無益怪異興災移徙見凶家宅不吉文書艱得已上中吉始末凶應三六九數及申子辰年月日時方位東南第十四下下時運大謬憂心孔艱窮居莫遂行者弗還占陰晴雨田蠶不收墳葬敗家六畜災損行人不回求謀大不遂求財大不利婚姻大不成官事大凶謁見不遇出行不宜修造不利疾病危篤走失不見生産見凶捕盜休尋禱祀招禍怪異官事移徙官非家宅大不安文書不遂已上全凶應二四八數及寅午戌年月日時方位西南第十五上上日月重輪河山帶礪玉券金書恩加來裔占陰晴晴田蠶大收墳葬吉利六畜大旺行人立至求謀大遂求財大利婚姻大成官事大吉謁見遇貴出行大通修造清吉疾病即愈走失即見生産有喜捕盜便獲禱祀獲福怪異無咎移徙獲吉家宅大安文書有就已上大吉應一五七數及亥卯未年月日時方位東北第十六中平巍峨三山濁浪滔天爰假飈輪方見神仙占陰晴半陰半晴田蠶半收墳葬半利六畜半吉行人在路求謀半遂求財半利婚姻晚成官事先凶後吉謁見小阻